name: Museum Pass Log
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  MuseumPassLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MuseumPassLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.museumlog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: MuseumPassLog/Info.plist
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MuseumPassLog/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
  MuseumPassLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MuseumPassLogTests
    dependencies:
      - target: MuseumPassLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  MuseumPassLogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MuseumPassLogUITests
    dependencies:
      - target: MuseumPassLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  MuseumPassLog:
    build:
      targets:
        MuseumPassLog: all
    test:
      targets:
        - MuseumPassLogTests
        - MuseumPassLogUITests
    run:
      config: Debug
